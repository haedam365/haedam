<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해담 무료사주풀이</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        /* 기본 배경 및 애니메이션 */
        body {
            font-family: 'Gowun Batang', serif;
            background: linear-gradient(to bottom, #050810, #101525);
            color: #fff; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; overflow-x: hidden; position: relative;
        }
        .moon { position: fixed; top: 8%; right: 12%; width: 90px; height: 90px; background: #fffde0; border-radius: 50%; box-shadow: 0 0 50px 15px rgba(255, 253, 224, 0.3); z-index: 0; }
        .cloud { position: fixed; background: rgba(255, 255, 255, 0.05); border-radius: 100px; filter: blur(10px); z-index: 0; animation: float linear infinite; }
        .cloud:nth-child(2) { width: 350px; height: 70px; top: 18%; left: -350px; animation-duration: 45s; }
        .cloud:nth-child(3) { width: 450px; height: 90px; top: 35%; left: -450px; animation-duration: 65s; animation-delay: -15s; }
        @keyframes float { from { transform: translateX(0); } to { transform: translateX(120vw); } }

        /* 메인 컨테이너 */
        .container {
            background-color: rgba(253, 251, 247, 0.98); padding: 45px; border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); width: 100%; max-width: 700px;
            text-align: center; position: relative; z-index: 1; border: 1px solid #dcd3c1;
            color: #333;
        }
        h1 { font-size: 30px; margin-bottom: 35px; color: #1a1a1a; font-weight: 700; border-bottom: 2px solid #8b2626; display: inline-block; padding-bottom: 12px; }

        /* 폼 요소 스타일 */
        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 9px; font-weight: 700; font-size: 16px; color: #222; }
        input[type="text"], input[type="number"], select, textarea { 
            width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; font-family: 'Gowun Batang', serif; background-color: #fff; 
        }
        textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #8b2626; }
        
        .date-inputs { display: flex; align-items: center; gap: 12px; }
        .date-inputs input { text-align: center; }
        
        /* 라디오 버튼 그룹 */
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .radio-group label { 
            flex: 1 1 auto; text-align: center; background-color: #f2ede4; padding: 12px 10px; 
            border-radius: 8px; cursor: pointer; margin: 0; font-weight: normal; transition: 0.2s; 
            border: 1px solid transparent; color: #444; font-size: 15px; white-space: nowrap;
        }
        .radio-group input[type="radio"] { display: none; }
        .radio-group label:has(input:checked) { background-color: #8b2626; color: white; font-weight: 700; box-shadow: 0 4px 10px rgba(139, 38, 38, 0.3); }

        /* 무료 사주풀이 버튼 */
        button.submit-btn { 
            width: 100%; padding: 18px; background: linear-gradient(135deg, #2c3e50, #1a252f); 
            color: white; border: none; border-radius: 8px; font-size: 19px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: 'Gowun Batang', serif; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }
        button.submit-btn:hover { background: linear-gradient(135deg, #1a252f, #0d1318); transform: translateY(-2px); }
        
        #loading-screen, #result-screen { display: none; }
        .spinner { border: 5px solid #f0ece1; border-top: 5px solid #8b2626; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 금장 테두리 및 네온 사주 프레임 */
        .saju-frame {
            margin-top: 30px; padding: 10px; background: #080a10; border-radius: 12px; position: relative;
            border: 2px solid #c5a059;
            box-shadow: 0 0 0 4px #080a10, 0 0 0 6px #d4af37, 0 10px 30px rgba(0,0,0,0.5);
        }
        .saju-frame::before, .saju-frame::after { content: ''; position: absolute; width: 20px; height: 20px; border: 3px solid #f9eb99; z-index: 2; }
        .saju-frame::before { top: -5px; left: -5px; border-right: none; border-bottom: none; border-top-left-radius: 8px;}
        .saju-frame::after { bottom: -5px; right: -5px; border-left: none; border-top: none; border-bottom-right-radius: 8px;}

        .saju-grid { display: grid; grid-template-columns: 70px repeat(4, 1fr); border-collapse: collapse; background-color: #080a10; }
        .grid-cell { border: 1px solid rgba(197, 160, 89, 0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px 5px; color: #fff; }
        .col-header { background-color: rgba(248, 246, 240, 0.05); font-weight: 700; font-size: 16px; color: #e5e0d8; padding: 20px 5px;}
        .row-header { background-color: rgba(248, 246, 240, 0.03); font-size: 14px; font-weight: 700; color: #bbb; border-right: 2px solid rgba(197, 160, 89, 0.5); }
        .shipseong-cell { font-size: 14px; color: #d4af37; font-weight: 700; height: 40px;}

        /* 네온 글자 스타일 */
        .char-container { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 0; }
        .neon-hangul { font-size: 48px; font-weight: 900; line-height: 1; margin-bottom: 2px; font-family: 'Gowun Batang', serif; }
        .sub-info { font-size: 14px; color: #aaa; font-weight: normal; display: flex; gap: 4px;}

        .wood .neon-hangul { color: #bffff0; text-shadow: 0 0 10px #2e7d63, 0 0 20px #2e7d63, 0 0 30px #2e7d63, 0 0 40px #1a5241; }
        .wood .sub-info { color: #5cb89a; }
        .fire .neon-hangul { color: #ffb3b3; text-shadow: 0 0 10px #c94040, 0 0 20px #c94040, 0 0 30px #c94040, 0 0 40px #8b2626; }
        .fire .sub-info { color: #e67e7e; }
        .earth .neon-hangul { color: #ffead0; text-shadow: 0 0 10px #b58536, 0 0 20px #b58536, 0 0 30px #b58536, 0 0 40px #856024; }
        .earth .sub-info { color: #d6ac69; }
        .metal .neon-hangul { color: #ffffff; text-shadow: 0 0 10px #aaaaaa, 0 0 20px #aaaaaa, 0 0 30px #aaaaaa, 0 0 40px #777777; }
        .metal .sub-info { color: #cccccc; }
        .water .neon-hangul { color: #d0e8ff; text-shadow: 0 0 10px #2a5275, 0 0 20px #2a5275, 0 0 30px #2a5275, 0 0 40px #1a354d; }
        .water .sub-info { color: #699bcc; }
        .unknown .neon-hangul { color: #444; text-shadow: none; font-size: 30px;}

        /* 풀이 영역 */
        .reading-container { margin-top: 40px; text-align: left; color: #333;}
        .reading-section { background-color: #fff; border: 1px solid #e5e0d8; border-radius: 8px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .reading-section h3 { margin: 0 0 15px 0; font-size: 19px; color: #8b2626; border-bottom: 1px dashed #e5e0d8; padding-bottom: 10px; font-weight: 700;}
        .reading-text { font-size: 16px; line-height: 1.8; color: #333; word-break: keep-all; text-align: justify; }

        /* 상담 연결 CTA 버튼 */
        .cta-btn { 
            background: linear-gradient(135deg, #8b2626, #5c1818); color: #fff; 
            border: 2px solid #c5a059; margin-top: 25px; font-family: 'Gowun Batang', serif; 
            width: 100%; padding: 20px; border-radius: 12px; font-size: 20px; 
            cursor: pointer; font-weight: 700; transition: 0.3s; 
            box-shadow: 0 8px 20px rgba(139, 38, 38, 0.4); 
        }
        .cta-btn:hover { background: linear-gradient(135deg, #a32d2d, #751e1e); transform: translateY(-3px); box-shadow: 0 12px 25px rgba(139, 38, 38, 0.6); }
    </style>
</head>
<body>

<div class="moon"></div><div class="cloud"></div><div class="cloud"></div>

<div class="container">
    <div id="input-screen">
        <h1>내담자정보</h1>
        <form id="saju-form">
            <div class="form-group"><label>이름</label><input type="text" id="name" placeholder="이름을 입력하세요" required></div>
            <div class="form-group">
                <label>성별</label>
                <div class="radio-group" style="margin-bottom: 12px;">
                    <label><input type="radio" name="gender" value="m" checked> <span>남성</span></label>
                    <label><input type="radio" name="gender" value="f"> <span>여성</span></label>
                </div>
            </div>
            <div class="form-group">
                <label>달력 구분</label>
                <div class="radio-group" style="margin-bottom: 12px;">
                    <label><input type="radio" name="calendar" value="solar" checked> <span>양력</span></label>
                    <label><input type="radio" name="calendar" value="lunar"> <span>음력</span></label>
                    <label><input type="radio" name="calendar" value="leap"> <span>윤달</span></label>
                </div>
            </div>
            <div class="form-group">
                <label>생년월일</label>
                <div class="date-inputs">
                    <input type="number" id="birth-year" placeholder="1995" required> <span>년</span>
                    <input type="number" id="birth-month" placeholder="3" min="1" max="12" required> <span>월</span>
                    <input type="number" id="birth-day" placeholder="1" min="1" max="31" required> <span>일</span>
                </div>
            </div>
            <div class="form-group">
                <label>태어난 시간</label>
                <select id="birth-time" required>
                    <option value="unknown">시간 모름</option>
                    <option value="00:30">자시 (23:30 ~ 01:29)</option>
                    <option value="02:30">축시 (01:30 ~ 03:29)</option>
                    <option value="04:30">인시 (03:30 ~ 05:29)</option>
                    <option value="06:30">묘시 (05:30 ~ 07:29)</option>
                    <option value="08:30" selected>진시 (07:30 ~ 09:29)</option>
                    <option value="10:30">사시 (09:30 ~ 11:29)</option>
                    <option value="12:30">오시 (11:30 ~ 13:29)</option>
                    <option value="14:30">미시 (13:30 ~ 15:29)</option>
                    <option value="16:30">신시 (15:30 ~ 17:29)</option>
                    <option value="18:30">유시 (17:30 ~ 19:29)</option>
                    <option value="20:30">술시 (19:30 ~ 21:29)</option>
                    <option value="22:30">해시 (21:30 ~ 23:29)</option>
                </select>
            </div>
            <div class="form-group">
                <label>현재 연애상태</label>
                <div class="radio-group">
                    <label><input type="radio" name="relationship" value="솔로" checked> <span>솔로</span></label>
                    <label><input type="radio" name="relationship" value="연애중"> <span>연애중</span></label>
                    <label><input type="radio" name="relationship" value="기혼"> <span>기혼</span></label>
                    <label><input type="radio" name="relationship" value="이혼"> <span>이혼</span></label>
                    <label><input type="radio" name="relationship" value="돌싱"> <span>돌싱</span></label>
                </div>
            </div>
            <div class="form-group">
                <label>현재 고민</label>
                <textarea id="concern" placeholder="어떤 고민이 있으신가요? 명확한 사주 조언을 위해 자세히 적어주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">무료 사주풀이</button>
        </form>
    </div>

    <div id="loading-screen">
        <h1 id="loading-msg">만세력을 짚어보는 중...</h1>
        <div class="spinner"></div>
    </div>

    <div id="result-screen">
        <h1><span id="result-name">OOO</span>님의 명식</h1>
        <div class="saju-frame">
            <div class="saju-grid">
                <div class="grid-cell row-header" style="border:none;"></div>
                <div class="grid-cell col-header">시주(時)</div>
                <div class="grid-cell col-header">일주(日)</div>
                <div class="grid-cell col-header">월주(月)</div>
                <div class="grid-cell col-header">년주(年)</div>
                <div class="grid-cell row-header">십성</div>
                <div id="t-ss" class="grid-cell shipseong-cell"></div>
                <div id="d-ss" class="grid-cell shipseong-cell">일간</div>
                <div id="m-ss" class="grid-cell shipseong-cell"></div>
                <div id="y-ss" class="grid-cell shipseong-cell"></div>
                <div class="grid-cell row-header">천간</div>
                <div id="t-stem" class="grid-cell"></div>
                <div id="d-stem" class="grid-cell"></div>
                <div id="m-stem" class="grid-cell"></div>
                <div id="y-stem" class="grid-cell"></div>
                <div class="grid-cell row-header">지지</div>
                <div id="t-branch" class="grid-cell"></div>
                <div id="d-branch" class="grid-cell"></div>
                <div id="m-branch" class="grid-cell"></div>
                <div id="y-branch" class="grid-cell"></div>
                <div class="grid-cell row-header">십성</div>
                <div id="t-bss" class="grid-cell shipseong-cell"></div>
                <div id="d-bss" class="grid-cell shipseong-cell"></div>
                <div id="m-bss" class="grid-cell shipseong-cell"></div>
                <div id="y-bss" class="grid-cell shipseong-cell"></div>
            </div>
        </div>

        <div class="reading-container">
            <div class="reading-section">
                <h3>타고난 성향과 기질</h3>
                <div class="reading-text" id="text-nature"></div>
            </div>
            <div class="reading-section">
                <h3>장점과 단점</h3>
                <div class="reading-text" id="text-pros-cons"></div>
            </div>
            <div class="reading-section">
                <h3>2026년(丙午) 총운</h3>
                <div class="reading-text" id="text-2026"></div>
            </div>
            <div class="reading-section" style="border: 2px solid #e5e0d8; background-color: #fdfbf7;">
                <h3>고민에 대한 명리적 조언</h3>
                <div class="reading-text" id="text-advice"></div>
            </div>
        </div>
        <button type="button" class="cta-btn" onclick="alert('서비스 준비중입니다!')">자세한 사주풀이 받아보기(준비중)</button>
    </div>
</div>

<script>
    const ohaengMap = {
        '甲': { hg: '갑', el: '목', type: '+목', class: 'wood' }, '乙': { hg: '을', el: '목', type: '-목', class: 'wood' },
        '丙': { hg: '병', el: '화', type: '+화', class: 'fire' }, '丁': { hg: '정', el: '화', type: '-화', class: 'fire' },
        '戊': { hg: '무', el: '토', type: '+토', class: 'earth' }, '己': { hg: '기', el: '토', type: '-토', class: 'earth' },
        '庚': { hg: '경', el: '금', type: '+금', class: 'metal' }, '辛': { hg: '신', el: '금', type: '-금', class: 'metal' },
        '壬': { hg: '임', el: '수', type: '+수', class: 'water' }, '癸': { hg: '계', el: '수', type: '-수', class: 'water' },
        '子': { hg: '자', el: '수', type: '-수', class: 'water' }, '丑': { hg: '축', el: '토', type: '-토', class: 'earth' },
        '寅': { hg: '인', el: '목', type: '+목', class: 'wood' }, '卯': { hg: '묘', el: '목', type: '-목', class: 'wood' },
        '辰': { hg: '진', el: '토', type: '+토', class: 'earth' }, '巳': { hg: '사', el: '화', type: '+화', class: 'fire' },
        '午': { hg: '오', el: '화', type: '-화', class: 'fire' }, '未': { hg: '미', el: '토', type: '-토', class: 'earth' },
        '申': { hg: '신', el: '금', type: '+금', class: 'metal' }, '酉': { hg: '유', el: '금', type: '-금', class: 'metal' },
        '戌': { hg: '술', el: '토', type: '+토', class: 'earth' }, '亥': { hg: '해', el: '수', type: '+수', class: 'water' }
    };

    function getShipseong(dayStemHanja, targetHanja) {
        if (!dayStemHanja || !targetHanja || targetHanja === '?') return '';
        if (dayStemHanja === targetHanja) return '비견';
        const me = ohaengMap[dayStemHanja], target = ohaengMap[targetHanja];
        if (!me || !target) return '';
        const elements = { '목': 0, '화': 1, '토': 2, '금': 3, '수': 4 };
        const diff = (elements[target.el] - elements[me.el] + 5) % 5;
        const isSame = (me.type.charAt(0) === target.type.charAt(0));
        const map = { 0: isSame ? '비견' : '겁재', 1: isSame ? '식신' : '상관', 2: isSame ? '편재' : '정재', 3: isSame ? '편관' : '정관', 4: isSame ? '편인' : '정인' };
        return map[diff];
    }

    function renderChar(hanja) {
        if (!hanja || hanja === '?' || !ohaengMap[hanja]) return `<div class="char-container unknown"><span class="neon-hangul">?</span></div>`;
        const data = ohaengMap[hanja];
        return `<div class="char-container ${data.class}"><span class="neon-hangul">${data.hg}</span><div class="sub-info"><span>${hanja}</span><span>${data.type}</span></div></div>`;
    }

    // ★ 가짜 함수를 지우고, 다시 Vercel 서버(AI)를 호출하는 함수로 완벽 복구했습니다!
    async function fetchRealSajuReading(name, dayStem, relationship, concern, sajuData) {
        try {
            document.getElementById('loading-msg').textContent = "AI가 명식을 분석 중입니다...";
            
            const response = await fetch('/api/saju', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, dayStem, relationship, concern, sajuData })
            });

            if (!response.ok) throw new Error('서버 응답 오류');

            const aiResult = await response.json();
            
            // AI가 보내온 500자 분량의 진짜 답변을 화면에 꽂아넣습니다.
            document.getElementById('text-nature').innerHTML = aiResult.nature;
            document.getElementById('text-pros-cons').innerHTML = aiResult.pros_cons;
            document.getElementById('text-2026').innerHTML = aiResult.fortune_2026;
            document.getElementById('text-advice').innerHTML = aiResult.advice;

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

        } catch (error) {
            console.error("AI API 에러:", error);
            alert('AI 풀이를 가져오는 중 문제가 발생했습니다. 서버 연결 상태를 확인해주세요.');
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('input-screen').style.display = 'block';
        }
    }

    document.getElementById('saju-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const dob = `${document.getElementById('birth-year').value}-${document.getElementById('birth-month').value.padStart(2, '0')}-${document.getElementById('birth-day').value.padStart(2, '0')}`;
        const time = document.getElementById('birth-time').value;
        const calendar = document.querySelector('input[name="calendar"]:checked').value;
        const relationship = document.querySelector('input[name="relationship"]:checked').value;
        const concern = document.getElementById('concern').value;

        document.getElementById('input-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';
        
        calculateAndCallAI(name, dob, time, calendar, relationship, concern);
    });

    function calculateAndCallAI(name, dob, time, calendar, relationship, concern) {
        const calcTime = time === 'unknown' ? '12:00' : time;
        let inputDate = new Date(`${dob}T${calcTime}:00`);
        if (time !== 'unknown') inputDate.setMinutes(inputDate.getMinutes() - 30);
        
        const [y, m, d, h, min] = [inputDate.getFullYear(), inputDate.getMonth() + 1, inputDate.getDate(), inputDate.getHours(), inputDate.getMinutes()];
        
        try {
            const bazi = calendar === 'solar' ? 
                Solar.fromYmdHms(y, m, d, h, min, 0).getLunar().getEightChar() : 
                Lunar.fromYmdHms(y, calendar === 'leap' ? -m : m, d, h, min, 0).getEightChar();
            
            const [yearH, monthH, dayH] = [bazi.getYear(), bazi.getMonth(), bazi.getDay()];
            const timeH = time === 'unknown' ? ['?', '?'] : bazi.getTime();
            const dayStem = dayH[0];
            
            document.getElementById('result-name').textContent = name;
            
            ['t', 'd', 'm', 'y'].forEach((p, i) => {
                const targetStem = [timeH[0], dayStem, monthH[0], yearH[0]][i];
                const targetBranch = [timeH[1], dayH[1], monthH[1], yearH[1]][i];
                document.getElementById(`${p}-ss`).textContent = p === 'd' ? '일간(나)' : getShipseong(dayStem, targetStem);
                document.getElementById(`${p}-bss`).textContent = getShipseong(dayStem, targetBranch);
                document.getElementById(`${p}-stem`).innerHTML = renderChar(targetStem);
                document.getElementById(`${p}-branch`).innerHTML = renderChar(targetBranch);
            });
            
            const timeStr = typeof timeH === 'string' ? timeH : timeH.join('');
            const sajuData = { year: yearH, month: monthH, day: dayH, time: timeStr };
            
            // 여기서 AI 백엔드 API 호출을 시작합니다.
            fetchRealSajuReading(name, dayStem, relationship, concern, sajuData);
            
        } catch (error) { 
            console.error("날짜 계산 에러:", error);
            alert('날짜 계산 중 오류가 발생했습니다.'); 
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('input-screen').style.display = 'block';
        }
    }
</script>
